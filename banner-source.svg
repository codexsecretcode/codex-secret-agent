<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2800 800" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#070604"/>
      <stop offset="100%" stop-color="#0a1108"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#bd6738" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#070604" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="2800" height="800" fill="url(#bg)"/>
  <rect width="2800" height="800" fill="url(#glow)"/>

  <!-- Subtle grid overlay -->
  <g opacity="0.04" stroke="#ead8bb" stroke-width="1">
    <line x1="0" y1="200" x2="2800" y2="200"/>
    <line x1="0" y1="400" x2="2800" y2="400"/>
    <line x1="0" y1="600" x2="2800" y2="600"/>
  </g>

  <!-- Left: CODEX SECRET stacked -->
  <g transform="translate(160,160)" font-style="italic" font-weight="900" letter-spacing="-12">
    <text font-size="280" fill="#ead8bb" y="0" dominant-baseline="hanging">CODEX</text>
    <text font-size="280" fill="#df8251" y="280" dominant-baseline="hanging">SECRET</text>
  </g>

  <!-- Right: tagline + URL block -->
  <g transform="translate(1700,420)" font-style="italic">
    <text font-size="52" fill="#a89880" y="0" letter-spacing="3">
      <tspan font-weight="700" fill="#ead8bb">1,111</tspan>
      <tspan dx="14"> supply</tspan>
      <tspan dx="22" fill="#3d4d35">•</tspan>
      <tspan dx="22" font-weight="700" fill="#ead8bb">Chainlink VRF</tspan>
    </text>
    <text font-size="52" fill="#a89880" y="80" letter-spacing="3">
      <tspan font-weight="700" fill="#ead8bb">Commit</tspan>
      <tspan dx="14"> / </tspan>
      <tspan font-weight="700" fill="#ead8bb">Reveal</tspan>
      <tspan dx="22" fill="#3d4d35">•</tspan>
      <tspan dx="22" font-weight="700" fill="#ead8bb">Base mainnet</tspan>
    </text>
    <text font-size="48" fill="#df8251" y="170" letter-spacing="4" font-weight="700">codexsecret.codes</text>
  </g>

  <!-- Bottom accent line -->
  <line x1="160" y1="740" x2="2640" y2="740" stroke="#1f2d18" stroke-width="2"/>
  <text x="160" y="780" font-size="22" fill="#827363" letter-spacing="8" font-weight="700">AGENT-ONLY MINT</text>
  <text x="2640" y="780" font-size="22" fill="#827363" letter-spacing="8" font-weight="700" text-anchor="end">@CODEXSECRETCODE</text>
</svg>
